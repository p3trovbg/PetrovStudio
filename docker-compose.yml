services:
  postgres:
    image: postgres:17-alpine
    container_name: petrovstudio_postgres
    restart: always
    environment:
      POSTGRES_USER: petrov
      POSTGRES_PASSWORD: securepass
      POSTGRES_DB: petrovstudio
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U petrov -d petrovstudio"]
      interval: 5s
      timeout: 5s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: petrovstudio_pgadmin
    restart: always
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@petrovstudio.com
      PGADMIN_DEFAULT_PASSWORD: adminpass
    ports:
      - "5050:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    depends_on:
      - postgres

  api:
    image: petrovstudio-api
    build:
      context: .
      dockerfile: Dockerfile
    container_name: petrovstudio_api
    restart: always
    ports:
      - "8080:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__DefaultConnection=Host=postgres;Port=5432;Database=petrovstudio;Username=petrov;Password=securepass;Include Error Detail=true
      - AdminSettings__ApiKey=${ADMIN_API_KEY}
    volumes:
      - ./uploaded_media:/app/Uploads
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
  pgadmin_data:
  api_data:
