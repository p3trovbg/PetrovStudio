services:
  postgres:
    image: postgres:17-alpine
    container_name: petrovstudio_postgres
    restart: always
    environment:
      POSTGRES_USER: petrov
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: petrovstudio
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U petrov -d petrovstudio"]
      interval: 5s
      timeout: 5s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: petrovstudio_pgadmin
    restart: always
    environment:
      PGADMIN_DEFAULT_EMAIL: admin
      PGADMIN_DEFAULT_PASSWORD: 123456
    ports:
      - "5050:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    depends_on:
      - postgres

  api:
    image: petrovstudio-api
    build:
      context: ../src
      dockerfile: Dockerfile
    container_name: petrovstudio_api
    restart: always
    ports:
      - "8080:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=${ASPNETCORE_ENVIRONMENT}
      - ConnectionStrings__DefaultConnection=${CONNECTION_STRING}
      - AdminSettings__ApiKey=${ADMIN_API_KEY}
    volumes:
      - ../src/uploaded_media:/app/Uploads
    depends_on:
      postgres:
        condition: service_healthy

  client:
    image: petrovstudio-client
    build:
      context: ../client
      dockerfile: Dockerfile
    container_name: petrovstudio_client
    restart: always
    ports:
      - "3000:80"
    depends_on:
      - api

volumes:
  postgres_data:
  pgadmin_data:
  api_data:
