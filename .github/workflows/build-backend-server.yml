name: Build Backend and Frontend

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
    
env:
  ADMIN_API_KEY: ${{ secrets.ADMIN_API_KEY }}
  CONNECTION_STRING: ${{ secrets.CONNECTION_STRING }}
  ASPNETCORE_ENVIRONMENT: ${{ secrets.ASPNETCORE_ENVIRONMENT }}
  POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
  
jobs:
  validate-and-test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 10.0.x
        
    - name: Restore .NET dependencies
      run: dotnet restore
      
    - name: Build .NET
      run: dotnet build --no-restore
      
    - name: Run .NET Tests
      run: dotnet test --no-build --verbosity normal
      
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        cache-dependency-path: ./client/package-lock.json
        node-version: 22
        cache: 'npm'
        
    - name: Install Frontend dependencies
      working-directory: ./client
      run: npm ci
      
    - name: Build Frontend
      working-directory: ./client
      run: npm run build
      
  docker-integration:
      runs-on: ubuntu-latest
      needs: validate-and-test
    
      steps:
      - uses: actions/checkout@v4
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Build Docker images
        run: docker compose -f deploy/docker-compose.yml build
    
      - name: Start containers
        run: docker compose -f deploy/docker-compose.yml --env-file .env.example up -d
    
      - name: Health Check
        run: |
          timeout 15s bash -c '
          until curl --fail http://localhost:8080/health; do
            echo "Waiting for API to be healthy..."
            sleep 2
          done'
    
      - name: Show compose logs
        if: always()
        run: docker compose -f deploy/docker-compose.yml logs api
    
      - name: Stop containers
        if: always()
        run: docker compose -f deploy/docker-compose.yml down
